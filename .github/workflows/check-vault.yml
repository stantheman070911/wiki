name: Check vault architecture

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-vault:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deterministic dependencies
        run: npm ci

      - name: Run canonical vault gate
        run: npm run check
