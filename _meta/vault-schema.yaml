schema_version: 1
schema_name: THE WIKI vault architecture

filesystem:
  ignored_directories:
    - .git
    - .obsidian
    - .claude
    - node_modules
  ignored_prefixes:
    - tools/tests/fixtures/
  markdown_extension: .md
  generated_artifacts:
    - _meta/Tags.md
    - _meta/Topic-Index.md
    - _meta/Portable Index.md
    - _meta/Source and Author Index.md
    - _meta/Editorial Dashboard.md
    - _meta/Architecture Report.md
    - _meta/Maintenance Review.md
    - _meta/Search Performance.md
    - 07-Articles/Articles Index.md
    - Reports/Reports Index.md
  deterministic_artifacts:
    - _meta/Tags.md
    - _meta/Topic-Index.md
    - _meta/Portable Index.md
    - _meta/Source and Author Index.md
    - _meta/Editorial Dashboard.md
    - _meta/Maintenance Review.md
    - _meta/Architecture Report.md
    - 07-Articles/Articles Index.md
    - Reports/Reports Index.md
  limits:
    knowledge_filename_max_characters: 80
    source_filename_review_characters: 120
    source_review_bytes: 1000000
    source_split_bytes: 5000000
    source_archive_review_bytes: 250000000

scopes:
  audit:
    exclude_paths:
      - README.md
  knowledge:
    page_types: [strategy, playbook, framework, research, article, series-entry, series-hub]
  reader:
    page_types: [vault-home, domain-index, subdomain-index, article-index, report-index, report, strategy, playbook, framework, research, article, series-entry, series-hub]
  curated_reader:
    page_types: [vault-home, domain-index, subdomain-index, article-index, report-index, report, strategy, playbook, framework, research, article, series-entry, series-hub]
    exclude_generated: true
  organic_inbound:
    exclude_generated: true
    exclude_prefixes: [_meta/, 00-Templates/, 06-Source-Library/]
  knowledge_search:
    page_types: [vault-home, domain-index, subdomain-index, article-index, report-index, report, strategy, playbook, framework, research, article, series-entry, series-hub]
    include_prefixes: [01-Business-Strategy/, 02-Social-Media-Strategy/, 03-Tactics-and-Playbooks/, 04-Frameworks-and-Mental-Models/, 05-Intelligence-and-Research/, 07-Articles/, Reports/]
    include_paths: [Home.md, Home-ZH.md]
  default_graph:
    include_prefixes: [01-Business-Strategy/, 02-Social-Media-Strategy/, 03-Tactics-and-Playbooks/, 04-Frameworks-and-Mental-Models/, 05-Intelligence-and-Research/, 07-Articles/, Reports/]
    include_paths: [Home.md, Home-ZH.md]
    show_attachments: false
  source_traceability_graph:
    include_prefixes:
      - 01-Business-Strategy/
      - 02-Social-Media-Strategy/
      - 03-Tactics-and-Playbooks/
      - 04-Frameworks-and-Mental-Models/
      - 05-Intelligence-and-Research/
      - 06-Source-Library/
      - 07-Articles/
      - Reports/
    show_attachments: true

lifecycle:
  knowledge:
    active_states: [draft, reviewed, evergreen]
    retired_states: [deprecated, superseded, replaced, archived]
    states: [draft, reviewed, evergreen, deprecated, superseded, replaced, archived]
    transitions:
      draft: [reviewed, deprecated, superseded]
      reviewed: [draft, evergreen, deprecated, superseded]
      evergreen: [draft, reviewed, deprecated, superseded]
      deprecated: [superseded, archived]
      superseded: [replaced, archived]
      replaced: [archived]
      archived: []
    reviewed_on:
      draft: empty
      reviewed: nonempty
      evergreen: nonempty
    replacement_required: [superseded, replaced]
    review_intervals_days:
      evergreen: 180
      reviewed: 365
      deprecated: 90
      superseded: 30
  report:
    active_states: [draft, reviewed]
    retired_states: [superseded]
    states: [draft, reviewed, superseded]
    transitions:
      draft: [reviewed, superseded]
      reviewed: [superseded]
      superseded: []
  source_processing:
    states: [unprocessed, processing, processed, superseded, exempt]
    transitions:
      unprocessed: [processing, exempt]
      processing: [processed, unprocessed, exempt]
      processed: [superseded]
      superseded: []
      exempt: [unprocessed]
  supporting:
    states: [evergreen, generated, historical]
    transitions:
      evergreen: [historical]
      generated: [generated, historical]
      historical: []

relationships:
  storage: frontmatter-array
  field: relationships
  item_shape:
    required: [type, target]
    nonempty: [type, target]
    additional_properties: false
  generated_body_section:
    heading_by_language:
      en: Relationships
      zh: 關係
    source: frontmatter
    hand_edit: false
  labels:
    prerequisite:
      direction: directed
      inverse: is-prerequisite-for
      explicit_inverse_required: true
      display: {en: Prerequisite, zh: 前置概念}
    is-prerequisite-for:
      direction: directed
      inverse: prerequisite
      explicit_inverse_required: true
      display: {en: Is prerequisite for, zh: 是其前置概念}
    applies:
      direction: directed
      inverse: is-applied-by
      explicit_inverse_required: true
      display: {en: Applies, zh: 應用於}
    is-applied-by:
      direction: directed
      inverse: applies
      explicit_inverse_required: true
      display: {en: Is applied by, zh: 由其應用}
    example:
      direction: directed
      inverse: has-example
      explicit_inverse_required: true
      display: {en: Example, zh: 例子}
    has-example:
      direction: directed
      inverse: example
      explicit_inverse_required: true
      display: {en: Has example, zh: 具有例子}
    replaces:
      direction: directed
      inverse: replaced-by
      explicit_inverse_required: true
      display: {en: Replaces, zh: 取代}
    replaced-by:
      direction: directed
      inverse: replaces
      explicit_inverse_required: true
      display: {en: Replaced by, zh: 被取代}
    derives-from:
      direction: directed
      inverse: has-derivative
      explicit_inverse_required: true
      display: {en: Derives from, zh: 衍生自}
    has-derivative:
      direction: directed
      inverse: derives-from
      explicit_inverse_required: true
      display: {en: Has derivative, zh: 具有衍生成果}
    contrast:
      direction: symmetric
      inverse: contrast
      explicit_reverse_required: true
      display: {en: Contrast, zh: 對照}
    translation:
      direction: symmetric
      inverse: translation
      explicit_reverse_required: true
      display: {en: Translation, zh: 翻譯}
    related:
      direction: symmetric
      inverse: related
      explicit_reverse_required: true
      display: {en: Related, zh: 相關}

provenance:
  knowledge_field: sources
  knowledge_item_shape:
    required: [id, role]
    nonempty: [id, role]
    additional_properties: false
    optional: [locator]
  roles: [primary, supporting, contrasting, example, background]
  generated_body_section:
    heading_by_language:
      en: Source reference
      zh: 來源
    source: frontmatter
    hand_edit: false
    row_format: '- **<role>:** [[<canonical source path>|<source title>]] — locator: <locator>'
  source_id:
    field: source_id
    unique: true
    stable: true
    pattern: '^SRC-[0-9]{4}$'
    allocation: sequential
  bibliography:
    canonical_fields: [title, creators, source_type, source_format, source_lang, note_lang, published_on, publisher, url]
    creator_item_shape:
      required: [name, role]
      nonempty: [name, role]
      additional_properties: false
    required_for_source: [title, creators, source_type, source_format, source_lang, note_lang]
    required_for_manifest: [title, creators, source_type, source_format, source_lang, note_lang]

report_lineage:
  derived_from:
    required: true
    nonempty: true
    target_format: canonical-extensionless-path
  supersedes:
    required: true
    maximum_targets: 1
    target_type: report
  generated_body_sections:
    derivation_heading: Derivation roots
    supersession_heading: Supersession lineage
    source: frontmatter
    hand_edit: false

heading_concepts:
  summary: [One-line summary, Summary, 一句話總結]
  context: [Context, Background, Principle, Scenario, 背景, 情境, 適用情境, 這一關的處境, 這是什麼]
  application: [Tactics / how to apply, Application, Implications, Recommended Action, 應用, 應用方式, 如何應用, 建議做法]
  relationships: [Relationships, 關係]
  source: [Source reference, Sources in THE WIKI, 來源]

layout_variants:
  standard-en:
    languages: [en]
    required_concepts: [summary, context, application, relationships, source]
  strategy-zh:
    languages: [zh]
    exact_h2: [一句話總結, 背景, 核心策略, 應用, 關係, 來源]
  playbook-zh:
    languages: [zh]
    exact_h2: [一句話總結, 背景, 執行方法, 應用, 關係, 來源]
  framework-zh:
    languages: [zh]
    exact_h2: [一句話總結, 背景, 核心模型, 應用, 關係, 來源]
  research-zh:
    languages: [zh]
    exact_h2: [一句話總結, 背景, 觀察與證據, 應用, 關係, 來源]
  series-entry-zh:
    languages: [zh]
    exact_h2: [一句話總結, 背景, 核心內容, 應用, 關係, 來源]
  article:
    languages: [en]
    required_headings: [Sources in THE WIKI]
  article-zh:
    languages: [zh]
    required_headings_any: [THE WIKI 來源, 來源]
  series-hub:
    languages: [en, zh]
